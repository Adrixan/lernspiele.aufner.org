    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4ADE80" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#22C55E" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <link rel="manifest" href="./manifest.json" />

    <!-- Apple Touch Icon -->

    <!-- Preconnect to common origins -->
    <link rel="preconnect" href="./" />

    <title>DaZ Lernspiele | Deutsch als Zweitsprache</title>

    <!-- Exercise data will be loaded as an IIFE script -->
    <script defer src="./data/exercises.js"></script>
    <script defer src="./assets/index-Cko7aSho.js"></script>
</head>

<body>
    <div id="root"></div>

    <!-- Service Worker Registration -->
    <script>
        // Register service worker for PWA support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('SW registered:', registration.scope);

                        // Check for updates
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            if (newWorker) {
                                newWorker.addEventListener('statechange', () => {
                                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                        // New content available, notify user
                                        console.log('New content available, please refresh.');
                                    }
                                });
                            }
                        });
                    })
                    .catch((error) => {
                        console.log('SW registration failed:', error);
                    });
            });
        }
    </script>
</body>

</html>
