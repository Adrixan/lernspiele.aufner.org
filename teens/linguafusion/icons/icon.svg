<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#2D1B4E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4A261"/>
      <stop offset="100%" style="stop-color:#E76F51"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Decorative ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#0f3460" stroke-width="4" opacity="0.6"/>
  <circle cx="256" cy="256" r="195" fill="none" stroke="#F4A261" stroke-width="1.5" opacity="0.3"/>
  <!-- LF letters -->
  <text x="256" y="310" 
        font-family="Georgia, serif" 
        font-size="220" 
        font-weight="bold"
        text-anchor="middle" 
        fill="url(#gold)"
        letter-spacing="-10">LF</text>
  <!-- Small decorative dots at corners of ring -->
  <circle cx="256" cy="46" r="6" fill="#F4A261" opacity="0.7"/>
  <circle cx="256" cy="466" r="6" fill="#F4A261" opacity="0.7"/>
  <circle cx="46" cy="256" r="6" fill="#F4A261" opacity="0.7"/>
  <circle cx="466" cy="256" r="6" fill="#F4A261" opacity="0.7"/>
</svg>